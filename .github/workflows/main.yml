name: RDP

on:
  workflow_dispatch:
    inputs:
      rdp_password:
        description: 'Contraseña para el usuario RDP'
        required: true
        type: string

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:

      # ─────────────────────────────────────────
      # 1. LIBERAR ESPACIO EN DISCO
      # ─────────────────────────────────────────
      - name: Free Disk Space
        shell: pwsh
        run: |
          $paths = @(
            "C:\hostedtoolcache\windows\go",
            "C:\hostedtoolcache\windows\node",
            "C:\hostedtoolcache\windows\PyPy",
            "C:\hostedtoolcache\windows\Ruby",
            "C:\Program Files\dotnet",
            "C:\Program Files (x86)\Microsoft Visual Studio",
            "C:\Program Files\Microsoft Visual Studio",
            "C:\Program Files (x86)\Android",
            "C:\Program Files\Android",
            "C:\Program Files\MongoDB",
            "C:\Program Files\MySQL",
            "C:\Program Files\PostgreSQL",
            "C:\Program Files\R",
            "C:\Program Files\Amazon",
            "C:\Program Files\Google\Chrome",
            "C:\Program Files\Mozilla Firefox",
            "C:\Program Files (x86)\Windows Kits",
            "C:\Program Files\LLVM",
            "C:\ProgramData\chocolatey\lib",
            "C:\tools\php",
            "C:\Strawberry"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
          Stop-Service wuauserv -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Windows\SoftwareDistribution\Download\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\*"             -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Windows\Temp\*"       -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Windows\Prefetch\*"   -Recurse -Force -ErrorAction SilentlyContinue
          $free = [math]::Round((Get-PSDrive C).Free / 1GB, 2)
          Write-Host "Disco libre: $free GB"

      # ─────────────────────────────────────────
      # 2. INSTALAR BRAVE
      # ─────────────────────────────────────────
      - name: Install Brave Browser
        shell: pwsh
        run: |
          $url  = "https://referrals.brave.com/latest/BraveBrowserSetup-BRV010.exe"
          $inst = "$env:TEMP\brave.exe"
          Invoke-WebRequest -Uri $url -OutFile $inst -UseBasicParsing
          Start-Process $inst -ArgumentList "/silent", "/install" -Wait
          Remove-Item $inst -Force -ErrorAction SilentlyContinue
          Write-Host "Brave instalado"

      # ─────────────────────────────────────────
      # 3. INSTALAR FFMPEG
      # ─────────────────────────────────────────
      - name: Install FFmpeg
        shell: pwsh
        run: |
          $url  = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zip  = "$env:TEMP\ffmpeg.zip"
          $dest = "C:\ffmpeg"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Remove-Item $zip -Force
          $inner = Get-ChildItem $dest -Directory | Select-Object -First 1
          if ($inner) {
            Copy-Item "$($inner.FullName)\bin\*" "$dest\" -Force
            Remove-Item $inner.FullName -Recurse -Force
          }
          $cur = [System.Environment]::GetEnvironmentVariable("PATH", "Machine")
          [System.Environment]::SetEnvironmentVariable("PATH", "$cur;$dest", "Machine")
          $env:PATH += ";$dest"
          ffmpeg -version | Select-Object -First 1
          Write-Host "FFmpeg instalado en C:\ffmpeg"

      # ─────────────────────────────────────────
      # 4. CONFIGURAR RDP
      # ─────────────────────────────────────────
      - name: Configure RDP
        shell: pwsh
        run: |
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name fDenyTSConnections -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name UserAuthentication -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name SecurityLayer -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-In" 2>$null
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force
          Write-Host "RDP configurado"

      # ─────────────────────────────────────────
      # 5. CREAR USUARIO RDP
      # ─────────────────────────────────────────
      - name: Create RDP User
        shell: pwsh
        run: |
          $pw  = '${{ github.event.inputs.rdp_password }}'
          $sec = ConvertTo-SecureString $pw -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $sec -AccountNeverExpires -ErrorAction Stop
          Add-LocalGroupMember -Group "Administrators"       -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          Write-Host "Usuario RDP creado"

      # ─────────────────────────────────────────
      # 6. INSTALAR TAILSCALE
      # ─────────────────────────────────────────
      - name: Install Tailscale
        shell: pwsh
        run: |
          $url  = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $inst = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $url -OutFile $inst -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$inst`" /quiet /norestart" -Wait
          Remove-Item $inst -Force
          Write-Host "Tailscale instalado"

      # ─────────────────────────────────────────
      # 7. CONECTAR TAILSCALE Y OBTENER IP
      # ─────────────────────────────────────────
      - name: Connect Tailscale
        shell: pwsh
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          & $ts up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname="gh-$env:GITHUB_RUN_ID" --accept-routes
          $ip = $null
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep 4
            $ip = (& $ts ip -4 2>$null) | Select-Object -First 1
            if ($ip) { break }
          }
          if (-not $ip) { Write-Error "Tailscale: no se obtuvo IP"; exit 1 }
          "TAILSCALE_IP=$ip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Tailscale IP: $ip"

      # ─────────────────────────────────────────
      # 8. VERIFICAR RDP
      # ─────────────────────────────────────────
      - name: Verify RDP
        shell: pwsh
        run: |
          $t = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
          if (-not $t.TcpTestSucceeded) { Write-Error "Puerto 3389 no accesible"; exit 1 }
          Write-Host "RDP OK en $($env:TAILSCALE_IP):3389"

      # ─────────────────────────────────────────
      # 9. MANTENER SESIÓN (~5 h 45 min)
      # ─────────────────────────────────────────
      - name: Keep Alive
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "  RDP LISTO"
          Write-Host "  IP      : $env:TAILSCALE_IP"
          Write-Host "  Usuario : RDP"
          Write-Host "  Puerto  : 3389"
          Write-Host "  FFmpeg  : C:\ffmpeg"
          Write-Host "  Brave   : instalado"
          Write-Host "========================================"
          $end = (Get-Date).AddMinutes(340)
          while ((Get-Date) -lt $end) {
            $disk = [math]::Round((Get-PSDrive C).Free / 1GB, 2)
            $ram  = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory / 1MB, 2)
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Activo | Disco: $disk GB | RAM: $ram GB"
            Start-Sleep 60
          }
          Write-Host "Sesion finalizada (limite de tiempo alcanzado)"
