name: RDP

on:
  workflow_dispatch:
    inputs:
      rdp_password:
        description: 'Contraseña para el usuario RDP'
        required: true
        type: string

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:

      - name: Free Disk Space + Install Tools
        shell: pwsh
        run: |
          @(
            "C:\Program Files\dotnet",
            "C:\Program Files (x86)\Microsoft Visual Studio",
            "C:\Program Files\Microsoft Visual Studio",
            "C:\Program Files (x86)\Android",
            "C:\Program Files\Android",
            "C:\Program Files\MongoDB",
            "C:\Program Files\MySQL",
            "C:\Program Files\PostgreSQL",
            "C:\Program Files\Microsoft SQL Server",
            "C:\Program Files (x86)\Microsoft SDKs",
            "C:\Program Files\Microsoft SDKs",
            "C:\ProgramData\chocolatey",
            "C:\ProgramData\Microsoft\VisualStudio",
            "C:\ProgramData\MongoDB",
            "C:\ProgramData\MySQL",
            "C:\Windows\Temp",
            "C:\Windows\SoftwareDistribution\Download",
            "C:\Users\runneradmin\AppData\Local\Temp",
            "C:\Users\runneradmin\AppData\Local\npm-cache",
            "C:\Users\runneradmin\AppData\Roaming\npm-cache"
          ) | ForEach-Object { if (Test-Path $_) { Remove-Item $_ -Recurse -Force -EA SilentlyContinue } }

          Write-Host "C: libre: $([math]::Round((Get-PSDrive C).Free/1GB,2)) GB"

          # FFmpeg
          $zip = "$env:TEMP\ffmpeg.zip"; $dest = "C:\ffmpeg"
          Invoke-WebRequest "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile $zip -UseBasicParsing
          Expand-Archive $zip $dest -Force; Remove-Item $zip -Force
          $inner = Get-ChildItem $dest -Directory | Select-Object -First 1
          if ($inner) { Copy-Item "$($inner.FullName)\bin\*" "$dest\" -Force; Remove-Item $inner.FullName -Recurse -Force }
          $p = [System.Environment]::GetEnvironmentVariable("PATH","Machine")
          [System.Environment]::SetEnvironmentVariable("PATH","$p;$dest;C:\Program Files\7-Zip","Machine")
          $env:PATH += ";$dest;C:\Program Files\7-Zip"

          # 7-Zip
          $msi = "$env:TEMP\7zip.msi"
          Invoke-WebRequest "https://www.7-zip.org/a/7z2301-x64.msi" -OutFile $msi -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /quiet /norestart" -Wait
          Remove-Item $msi -Force -EA SilentlyContinue

          # Brave
          $br = "$env:TEMP\brave.exe"
          Invoke-WebRequest "https://referrals.brave.com/latest/BraveBrowserSetup-BRV010.exe" -OutFile $br -UseBasicParsing
          Start-Process $br -ArgumentList "/silent","/install" -Wait
          Remove-Item $br -Force -EA SilentlyContinue

          Write-Host "Herramientas instaladas. C: libre: $([math]::Round((Get-PSDrive C).Free/1GB,2)) GB"

      - name: Python + Scripts
        shell: pwsh
        run: |
          $python = $null
          $candidates = @(
            (Get-Command python -ErrorAction SilentlyContinue)?.Source
          ) + (Get-ChildItem "C:\hostedtoolcache\windows\Python" -Filter "python.exe" -Recurse -EA SilentlyContinue | Where-Object { $_.FullName -match "x64" } | Select-Object -ExpandProperty FullName)

          foreach ($c in $candidates) {
            if ($c -and (Test-Path $c)) { $python = $c; break }
          }
          if (-not $python) { Write-Error "Python no encontrado"; exit 1 }
          Write-Host "Usando Python: $python"

          $scriptsDir = Join-Path (Split-Path $python) "Scripts"
          $env:PATH = "$scriptsDir;$env:PATH"

          & $python -m pip install --upgrade pip setuptools wheel -q
          & $python -m pip install transformers datasets huggingface_hub accelerate tokenizers diffusers requests PyGithub httpx aiohttp tqdm pillow numpy pandas -q

          $dl = "C:\Users\runneradmin\Downloads"
          if (-not (Test-Path $dl)) { New-Item -ItemType Directory -Path $dl | Out-Null }
          @(
            @{ Url="https://huggingface.co/CineMax/plis2/resolve/main/hls.py?download=true"; Name="hls.py" },
            @{ Url="https://huggingface.co/CineMax/plis2/resolve/main/hug.py?download=true"; Name="hug.py" }
          ) | ForEach-Object { Invoke-WebRequest $_.Url -OutFile (Join-Path $dl $_.Name) -UseBasicParsing }
          Write-Host "Python y scripts listos"

      - name: Configure RDP + User
        shell: pwsh
        run: |
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 0 -Force
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name SecurityLayer -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-In" 2>$null
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

          $sec = ConvertTo-SecureString '${{ github.event.inputs.rdp_password }}' -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $sec -AccountNeverExpires -EA Stop
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          Write-Host "RDP configurado"

      - name: Install + Connect Tailscale
        shell: pwsh
        run: |
          # Descargar Tailscale desde HuggingFace
          $exe = "$env:TEMP\tailscale-setup.exe"
          Write-Host "Descargando Tailscale desde HuggingFace..."
          Invoke-WebRequest "https://huggingface.co/CineMax/plis2/resolve/main/tailscale-setup-1.96.3.exe?download=true" -OutFile $exe -UseBasicParsing
          Write-Host "Instalando Tailscale..."
          Start-Process $exe -ArgumentList "/S" -Wait
          Remove-Item $exe -Force -EA SilentlyContinue

          # Esperar y encontrar tailscale.exe
          $ts = $null
          for ($i = 0; $i -lt 30; $i++) {
            $found = Get-ChildItem @(
              "C:\Program Files\Tailscale",
              "C:\Program Files (x86)\Tailscale"
            ) -Filter "tailscale.exe" -EA SilentlyContinue | Select-Object -First 1

            if (-not $found) {
              $found = Get-ChildItem "C:\Program Files*" -Filter "tailscale.exe" -Recurse -EA SilentlyContinue | Select-Object -First 1
            }

            if ($found) { $ts = $found.FullName; break }
            Write-Host "Esperando tailscale.exe... intento $i"
            Start-Sleep 3
          }

          if (-not $ts) {
            $ts = (where.exe tailscale 2>$null) | Select-Object -First 1
            if (-not $ts) { Write-Error "Tailscale exe no encontrado"; exit 1 }
          }

          Write-Host "Tailscale encontrado en: $ts"

          # Asegurar que el servicio esta corriendo
          $svc = Get-Service -Name "Tailscale" -EA SilentlyContinue
          if ($svc -and $svc.Status -ne "Running") {
            Start-Service "Tailscale" -EA SilentlyContinue
            Start-Sleep 5
          }

          & $ts up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname="gh-$env:GITHUB_RUN_ID" --accept-routes --shields-up=false

          $ip = $null
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep 4
            $ip = (& $ts ip -4 2>$null) | Select-Object -First 1
            if ($ip) { break }
            Write-Host "Esperando IP de Tailscale... intento $i"
          }
          if (-not $ip) { Write-Error "Tailscale: no se obtuvo IP"; exit 1 }
          "TAILSCALE_IP=$ip" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

          $t = Test-NetConnection -ComputerName $ip -Port 3389 -WarningAction SilentlyContinue
          if (-not $t.TcpTestSucceeded) { Write-Error "Puerto 3389 no accesible via Tailscale"; exit 1 }

          Write-Host "========================================"
          Write-Host "  IP: $ip | Usuario: RDP | Puerto: 3389"
          Write-Host "========================================"

      - name: Keep Alive
        shell: pwsh
        run: |
          $end = (Get-Date).AddMinutes(340)
          while ((Get-Date) -lt $end) {
            $disk  = [math]::Round((Get-PSDrive C).Free/1GB,2)
            $diskD = [math]::Round((Get-PSDrive D).Free/1GB,2)
            $ram   = [math]::Round((Get-CimInstance Win32_OperatingSystem).FreePhysicalMemory/1MB,2)
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] C: $disk GB | D: $diskD GB | RAM: $ram GB"
            Start-Sleep 60
          }
